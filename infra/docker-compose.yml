x-api-env: &api-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DEBUG: ${DEBUG:-false}
  SECRET_KEY: ${SECRET_KEY:-}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://portfolio:portfolio@timescale:5432/portfolio_dev}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  POSTGRES_DB: ${POSTGRES_DB:-portfolio_dev}
  POSTGRES_USER: ${POSTGRES_USER:-portfolio}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
  EXTRA_CORS_ORIGINS: ${EXTRA_CORS_ORIGINS:-["http://localhost:3000"]}
  STARTUP_DB_INIT_ENABLED: ${STARTUP_DB_INIT_ENABLED:-false}
  STARTUP_REPAIRS_ENABLED: ${STARTUP_REPAIRS_ENABLED:-false}
  API_SCHEDULER_ENABLED: ${API_SCHEDULER_ENABLED:-false}
  OWNED_POLLING_ENABLED: ${OWNED_POLLING_ENABLED:-true}
  OWNED_POLLING_CADENCE_SECONDS: ${OWNED_POLLING_CADENCE_SECONDS:-900}
  BINANCE_AUTO_SYNC_ENABLED: ${BINANCE_AUTO_SYNC_ENABLED:-false}
  BINANCE_AUTO_SYNC_CADENCE_SECONDS: ${BINANCE_AUTO_SYNC_CADENCE_SECONDS:-3600}
  INSTITUTION_CREDENTIALS_MASTER_KEY: ${INSTITUTION_CREDENTIALS_MASTER_KEY:-}

services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: portfolio-timescale
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_dev}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - timescale-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - timescaledb.telemetry_level=off
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio_dev}
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: portfolio-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/ready
      interval: 15s
      timeout: 20s
      retries: 5

  api:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.api
    image: portfolio-tracker-api:local
    container_name: portfolio-api
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *api-env
    ports:
      - "${API_PORT:-8000}:8000"
    command: >-
      sh -c ': "$${SECRET_KEY:?Set SECRET_KEY to a strong local secret before starting the app profile}" && exec uv run --extra api --extra worker --extra shared --extra binance uvicorn app.main:app --app-dir api --host 0.0.0.0 --port 8000'
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readiness', timeout=5).read()\""
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  worker:
    profiles: ["app"]
    image: portfolio-tracker-api:local
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: portfolio-worker
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *api-env
    command: >-
      sh -c ': "$${SECRET_KEY:?Set SECRET_KEY to a strong local secret before starting the app profile}" && exec uv run --extra api --extra worker --extra shared --extra binance rq worker --url redis://redis:6379/0'
    healthcheck:
      test:
        - CMD-SHELL
        - "uv run --extra worker rq info --url redis://redis:6379/0 >/dev/null"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  scheduler:
    profiles: ["app"]
    image: portfolio-tracker-api:local
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: portfolio-scheduler
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      <<: *api-env
      SCHEDULER_POLL_INTERVAL_SECONDS: ${SCHEDULER_POLL_INTERVAL_SECONDS:-30}
    command: >-
      sh -c ': "$${SECRET_KEY:?Set SECRET_KEY to a strong local secret before starting the app profile}" && exec uv run --extra api --extra worker --extra shared --extra binance python -m worker.scheduler'
    healthcheck:
      test:
        - CMD-SHELL
        - "uv run --extra worker python -c \"import os, redis; redis.from_url(os.environ.get('REDIS_URL', 'redis://redis:6379/0')).ping()\""
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: portfolio-tracker-frontend:local
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"fetch('http://127.0.0.1:3000/login').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

volumes:
  timescale-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
